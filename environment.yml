name: bookforest2
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.11

  # Scientific / ML packages — use conda-forge builds to avoid MSVC on Windows
  - numpy>=1.26
  - scikit-learn>=1.4
  - hdbscan>=0.8.38
  - umap-learn>=0.5

  # HTML parsing
  - beautifulsoup4>=4.12
  - lxml>=5.0

  # HTTP / web
  - requests>=2.31

  # Config / serialization
  - pyyaml>=6.0

  # Progress bars
  - tqdm>=4.66

  # pip-only packages (not on conda-forge or better pinned via pip)
  - pip
  - pip:
    - pydantic>=2.6
    - pydantic-settings>=2.2
    - ollama>=0.3
    - chromadb>=0.5
    - fastapi>=0.111
    - uvicorn[standard]>=0.29
    - python-multipart>=0.0.9
